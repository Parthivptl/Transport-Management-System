<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | TMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --tms-primary: #3b82f6; --tms-dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--tms-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .register-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; padding: 40px; width: 100%; max-width: 700px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .brand-logo { font-size: 2.2rem; font-weight: 800; color: white; text-align: center; }
        .form-label { color: rgba(255, 255, 255, 0.7); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
        .input-group { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        .input-group:focus-within { border-color: var(--tms-primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); }
        .form-control { background: transparent; border: none; color: white; padding: 12px 15px; }
        .form-control:focus { background: transparent; color: white; box-shadow: none; }
        .input-group-text { background: transparent; border: none; color: rgba(255, 255, 255, 0.3); }
        .btn-register { background: var(--tms-primary); border: none; border-radius: 16px; padding: 16px; font-weight: 800; width: 100%; margin-top: 20px; color: white; transition: 0.3s; }
        .btn-register:hover { background: #1d4ed8; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="brand-logo mb-1">TMS <span class="text-primary">PRO</span></div>
        <p class="text-center text-white-50 small mb-4 text-uppercase fw-bold">Administrative Registration</p>
        
        <div class="row g-4">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <div class="input-group"><span class="input-group-text"><i class="bi bi-person"></i></span><input type="text" id="regName" class="form-control" placeholder="Parth Dev"></div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email Address</label>
                <div class="input-group"><span class="input-group-text"><i class="bi bi-envelope"></i></span><input type="email" id="regEmail" class="form-control" placeholder="admin@tmspro.com"></div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <div class="input-group"><span class="input-group-text"><i class="bi bi-telephone"></i></span><input type="tel" id="regPhone" class="form-control" placeholder="10-digit mobile"></div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <div class="input-group"><span class="input-group-text"><i class="bi bi-lock"></i></span><input type="password" id="regPass" class="form-control" placeholder="••••••••"></div>
            </div>
            <div class="col-12">
                <label class="form-label">Office Address</label>
                <div class="input-group"><span class="input-group-text pt-2"><i class="bi bi-geo-alt"></i></span><textarea id="regAddr" class="form-control" rows="2" placeholder="Full Business Address"></textarea></div>
            </div>
        </div>

        <button class="btn btn-primary btn-register" onclick="handleRegister()">Register Account</button>
        <div class="text-center mt-4 small"><a href="login.html" class="text-primary text-decoration-none fw-bold">Already have an account? Sign In</a></div>
    </div>

    <script>
    async function handleRegister() {
        // 1. Reference elements
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const pass = document.getElementById('regPass').value.trim();
        const addr = document.getElementById('regAddr').value.trim();
        const btn = document.querySelector('.btn-register');

        // 2. Advanced Validation Conditions
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRegex = /^[0-9]{10}$/;

        if (!name || !email || !phone || !pass || !addr) {
            return alert("⚠️ All fields are mandatory. Please fill the entire form.");
        }
        if (!emailRegex.test(email)) {
            return alert("📧 Please enter a valid professional email address.");
        }
        if (!phoneRegex.test(phone)) {
            return alert("📞 Phone number must be exactly 10 digits.");
        }
        if (pass.length < 6) {
            return alert("🔒 Password is too weak! Use at least 6 characters.");
        }

        try {
            // Disable button to prevent double-registration while waiting for server
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';

            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    fullName: name, 
                    email: email, 
                    phone: phone, 
                    address: addr, 
                    password: pass 
                    // Note: Role is forced to 'customer' in the backend for security
                })
            });

            const result = await res.json();

            if (res.ok && result.success) {
                alert("✅ Registration Successful! You can now log in.");
                window.location.href = "/login";
            } else {
                // Show the specific error from your backend (e.g., "Email already registered")
                alert("❌ Registration Failed: " + (result.error || "Unknown Error"));
            }

        } catch (err) {
            console.error("Network Error:", err);
            alert("📡 Server connection lost. Is your Node.js backend running?");
        } finally {
            // Re-enable button if registration fails
            btn.disabled = false;
            btn.innerHTML = 'Register Account';
        }
    }

    // Allow user to press 'Enter' key to submit
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleRegister();
    });
</script>
</body>
</html>
