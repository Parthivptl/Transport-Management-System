<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry Hub | TMS Pro Infrastructure</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --tms-primary: #4361ee;
            --tms-dark: #0b090a;
            --sidebar-width: 260px;
        }

        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; color: #2b2d42; }

        /* Sidebar Styling */
        .sidebar { 
            height: 100vh; width: var(--sidebar-width); background: var(--tms-dark); 
            color: white; position: fixed; top: 0; left: 0; padding-top: 2rem; z-index: 1000;
        }
        .sidebar-brand { padding: 0 1.5rem 2rem; color: white; font-weight: 700; font-size: 1.5rem; display: flex; align-items: center; }
        .sidebar a { 
            color: #8d99ae; padding: 12px 1.5rem; display: flex; align-items: center; 
            text-decoration: none; transition: 0.3s; border-right: 4px solid transparent;
        }
        .sidebar a:hover, .sidebar a.active { 
            color: white; background: rgba(255,255,255,0.05); border-right-color: var(--tms-primary);
        }

        /* Content Area */
        .main-wrapper { margin-left: var(--sidebar-width); padding: 2.5rem; }

        .glass-header {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            padding: 1.5rem 2rem; border-radius: 24px; margin-bottom: 2rem;
            border: 1px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .tms-card { 
            background: white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.02); 
            border: 1px solid rgba(0,0,0,0.05); overflow: hidden;
        }
        
        .search-container {
            max-width: 450px; background: #fff; border-radius: 14px; padding: 4px 15px; 
            display: flex; align-items: center; border: 1px solid #e2e8f0;
        }
        .search-container input { border: none; outline: none; width: 100%; padding: 10px; background: transparent; }
        
        .table thead th {
            background: #f8fafc; color: #64748b; font-size: 0.7rem; 
            text-transform: uppercase; letter-spacing: 1.5px; padding: 20px;
        }
        .table tbody td { padding: 20px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

        .btn-delete { 
            border-radius: 10px; width: 38px; height: 38px; 
            display: inline-flex; align-items: center; justify-content: center; 
            transition: 0.3s; border: 1px solid #fee2e2; background: #fff; color: #ef4444;
        }
        .btn-delete:hover { background: #ef4444; color: white; border-color: #ef4444; }
        
        .full-message { 
            font-size: 0.85rem; color: #475569; line-height: 1.5;
            max-width: 400px; word-wrap: break-word;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand"><i class="bi bi-shield-check-fill text-primary me-2"></i> TMS PRO</div>
        <a href="admin_dashboard.html"><i class="bi bi-grid-1x2-fill me-3"></i> Dashboard</a>
        <a href="manage_users.html"><i class="bi bi-people-fill me-3"></i> Users</a>
        <a href="manage_shipments.html"><i class="bi bi-truck-flatbed me-3"></i> Shipments</a>
        <a href="manage_payments.html"><i class="bi bi-credit-card-2-back me-3"></i> Payments</a>
        <a href="manage_fleet.html"><i class="bi bi-truck me-3"></i> Fleet</a>
        <a href="live_tracking.html"><i class="bi bi-geo-alt-fill me-3"></i> Tracking</a>
        <a href="manage_contacts.html" class="active"><i class="bi bi-chat-left-dots-fill me-3"></i> Inquiries</a>
        <div style="position: absolute; bottom: 20px; width: 100%;">
            <a href="login.html" class="text-danger border-0"><i class="bi bi-power me-3"></i> Logout</a>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="glass-header d-flex justify-content-between align-items-center">
            <div>
                <h3 class="fw-bold mb-1">Inquiry Management</h3>
                <p class="text-muted small mb-0">System Log: Clean and remove customer communications.</p>
            </div>
            <button class="btn btn-primary px-4 py-2 fw-bold shadow-sm" style="border-radius:12px;" onclick="loadQueries()">
                <i class="bi bi-arrow-clockwise me-2"></i>REFRESH HUB
            </button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="search-container">
                <i class="bi bi-search text-muted"></i>
                <input type="text" id="querySearch" placeholder="Search by name or content..." onkeyup="filterQueries()">
            </div>
            <div class="text-muted small">Total Logs: <span id="queryCount" class="fw-bold text-dark">0</span></div>
        </div>

        <div class="tms-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Date Received</th>
                            <th>Sender Details</th>
                            <th>Inquiry Message</th>
                            <th class="text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody id="queryTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadQueries() {
            try {
                const res = await fetch('/api/queries?t=' + Date.now());
                const queries = await res.json();
                const tableBody = document.getElementById('queryTableBody');
                document.getElementById('queryCount').innerText = queries.length;

                if(queries.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="4" class="text-center py-5 text-muted">No inquiry logs found.</td></tr>`;
                    return;
                }

                tableBody.innerHTML = queries.map(q => {
                    const date = new Date(q.date).toLocaleDateString() + ' ' + new Date(q.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    return `
                        <tr>
                            <td class="small fw-medium text-muted">${date}</td>
                            <td>
                                <div class="fw-bold text-dark">${q.name}</div>
                                <div class="small text-primary">${q.email}</div>
                            </td>
                            <td><div class="full-message">${q.message}</div></td>
                            <td class="text-end">
                                <button class="btn-delete" title="Delete Permanent" onclick="deleteQuery('${q._id}')">
                                    <i class="bi bi-trash3-fill"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (err) { console.error("Sync failed:", err); }
        }

        async function deleteQuery(id) {
            if(confirm("Confirm: Permanently delete this inquiry from the infrastructure hub?")) {
                try {
                    const res = await fetch(`/api/queries/${id}`, { method: 'DELETE' });
                    if(res.ok) loadQueries();
                } catch (err) { alert("Error connecting to server."); }
            }
        }

        function filterQueries() {
            const term = document.getElementById('querySearch').value.toLowerCase();
            const rows = document.querySelectorAll('#queryTableBody tr');
            let count = 0;
            rows.forEach(row => {
                const matches = row.innerText.toLowerCase().includes(term);
                row.style.display = matches ? '' : 'none';
                if(matches) count++;
            });
            document.getElementById('queryCount').innerText = count;
        }

        window.onload = loadQueries;
    </script>
</body>
</html>
