<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --tms-primary: #3b82f6; 
            --tms-dark: #0f172a; 
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, var(--tms-primary), #0b090a);
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 50px 40px;
            width: 100%; 
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .brand-logo { font-size: 2.2rem; font-weight: 800; color: white; margin-bottom: 10px; }
        .login-title { color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1.5px; }

        .form-group { text-align: left; margin-bottom: 25px; }
        .form-label { color: rgba(255, 255, 255, 0.8); font-size: 0.8rem; font-weight: 700; margin-left: 5px; margin-bottom: 8px; text-transform: uppercase; }

        .input-group {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; 
            overflow: hidden;
            transition: 0.3s;
        }
        
        .input-group:focus-within {
            border-color: var(--tms-primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .form-control { 
            background: transparent; 
            border: none; 
            color: white; 
            padding: 14px 15px; 
            font-size: 0.95rem; 
        }
        
        .form-control:focus { 
            background: transparent; 
            color: white; 
            box-shadow: none; 
        }

        .input-group-text { 
            background: transparent; 
            border: none; 
            color: rgba(255, 255, 255, 0.4); 
            padding-left: 18px;
        }

        .btn-login {
            background: var(--tms-primary); 
            border: none; 
            border-radius: 16px;
            padding: 16px; 
            font-weight: 800; 
            color: white; 
            width: 100%;
            margin-top: 15px; 
            transition: 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-login:hover { 
            background: #2563eb; 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .footer-link { margin-top: 30px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.4); }
        .footer-link a { color: var(--tms-primary); text-decoration: none; font-weight: 800; }
        
        .spinner-border-sm { margin-right: 8px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">
            <i class="bi bi-box-seize-fill text-primary"></i> TMS <span class="text-primary">PRO</span>
        </div>
        <div class="login-title">Secure Access Portal</div>

        <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" id="email" class="form-control" placeholder="name@company.com" autocomplete="email">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Secret Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
            </div>
        </div>

        <button class="btn btn-primary btn-login shadow" id="loginBtn" onclick="handleLogin()">
            Secure Sign In
        </button>

        <div class="footer-link mt-4">
            <p class="mb-0">New to TMS PRO? <a href="register.html">Create an account</a></p>
            <p class="mt-2 small"><a href="index.html" class="text-white-50 fw-normal">Back to Home</a></p>
        </div>
    </div>

  <script>
    async function handleLogin() {
        const emailInput = document.getElementById('email').value.trim();
        const passInput = document.getElementById('password').value.trim();
        const btn = document.getElementById('loginBtn');

        // 1. Basic empty check
        if(!emailInput || !passInput) return alert("⚠️ Please enter credentials.");

        try {
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Authenticating...';

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailInput, password: passInput })
            });

            const result = await res.json();

            if (res.ok && result.success) {
                // Save session to browser
                localStorage.setItem('tms_user', JSON.stringify(result.user));

                // --- HARDCODED ADMIN LOGIC START ---
                // If you want a specific email to ALWAYS be the Admin:
                const masterAdminEmail = "admin@gmail.com"; 
                const masterPassword = "admin123";

                if (emailInput.toLowerCase() === masterAdminEmail && passInput === masterPassword) {
                    console.log("Master Admin Detected");
                    window.location.href = "/admin_dashboard.html";
                    return;
                }
                // --- HARDCODED ADMIN LOGIC END ---

                // Standard Redirection based on Database Role
                if (result.user.role === 'admin') {
                    window.location.href = "/admin_dashboard.html"; 
                } else {
                    window.location.href = "/index.html"; 
                }

            } else {
                alert("❌ " + (result.error || "Login Failed"));
            }
        } catch (err) {
            alert("📡 Server is offline. Check your Node.js terminal.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Secure Sign In';
        }
    }

    // Allow Enter Key
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>
