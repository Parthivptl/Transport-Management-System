<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Control Hub | TMS Pro Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --tms-primary: #4361ee;
            --tms-dark: #0b090a;
            --sidebar-width: 260px;
        }

        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; color: #2b2d42; }

        /* --- SIDEBAR --- */
        .sidebar { 
            height: 100vh; width: var(--sidebar-width); background: var(--tms-dark); 
            color: white; position: fixed; top: 0; left: 0; padding-top: 2rem; z-index: 1000;
        }
        .sidebar-brand { padding: 0 1.5rem 2rem; color: white; font-weight: 700; font-size: 1.5rem; display: flex; align-items: center; }
        .sidebar a { 
            color: #8d99ae; padding: 12px 1.5rem; display: flex; align-items: center; 
            text-decoration: none; transition: 0.3s; border-right: 4px solid transparent;
        }
        .sidebar a:hover, .sidebar a.active { 
            color: white; background: rgba(255,255,255,0.05); border-right-color: var(--tms-primary);
        }

        .main-wrapper { margin-left: var(--sidebar-width); padding: 2.5rem; }

        .glass-header {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            padding: 1.5rem 2rem; border-radius: 24px; margin-bottom: 2rem;
            border: 1px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .search-container {
            max-width: 450px; background: #fff; border-radius: 14px; padding: 4px 15px; 
            display: flex; align-items: center; border: 1px solid #e2e8f0; transition: 0.3s;
        }
        .search-container input { border: none; outline: none; width: 100%; padding: 10px; background: transparent; }

        .tms-card { 
            background: white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.02); 
            border: 1px solid rgba(0,0,0,0.05); overflow: hidden;
        }
        .table thead th { background: #f8fafc; color: #64748b; font-size: 0.75rem; text-transform: uppercase; padding: 20px; letter-spacing: 1px;}
        .table tbody td { padding: 18px 20px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        
        .btn-action { 
            border-radius: 10px; width: 35px; height: 35px; 
            display: inline-flex; align-items: center; justify-content: center; 
            transition: 0.3s; border: 1px solid #e2e8f0; background: #fff;
        }
        .btn-action:hover { background: var(--tms-primary); color: white !important; border-color: var(--tms-primary); }

        .user-avatar { width: 40px; height: 40px; border-radius: 12px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; color: var(--tms-primary); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand"><i class="bi bi-shield-check-fill text-primary me-2"></i> TMS PRO</div>
        <a href="admin_dashboard.html"><i class="bi bi-grid-1x2-fill me-3"></i> Dashboard</a>
        <a href="manage_users.html" class="active"><i class="bi bi-people-fill me-3"></i> Users</a>
        <a href="manage_shipments.html"><i class="bi bi-truck-flatbed me-3"></i> Shipments</a>
        <a href="manage_payments.html"><i class="bi bi-credit-card-2-back me-3"></i> Payments</a>
        <a href="manage_fleet.html"><i class="bi bi-truck me-3"></i> Fleet</a>
        <a href="live_tracking.html"><i class="bi bi-geo-alt-fill me-3"></i> Tracking</a>
        <a href="manage_contacts.html"><i class="bi bi-chat-left-dots-fill me-3"></i> Inquiries</a>
        <div style="position: absolute; bottom: 20px; width: 100%;">
            <a href="login.html" class="text-danger border-0"><i class="bi bi-power me-3"></i> Logout</a>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="glass-header d-flex justify-content-between align-items-center">
            <div>
                <h3 class="fw-bold mb-1">User Management</h3>
                <p class="text-muted small mb-0">Control system access and authorized client data.</p>
            </div>
            <button class="btn btn-primary px-4 py-2 fw-bold shadow-sm" style="border-radius:12px;" data-bs-toggle="modal" data-bs-target="#addUserModal">
                <i class="bi bi-person-plus-fill me-2"></i>ADD USER
            </button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="search-container">
                <i class="bi bi-search text-muted"></i>
                <input type="text" id="userSearch" placeholder="Search by name, email or address..." onkeyup="filterUsers()">
            </div>
        </div>

        <div class="tms-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>User Profile</th>
                            <th>Contact Specification</th>
                            <th>Residential/Office Address</th>
                            <th class="text-end">Management</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header bg-primary text-white border-0">
                    <h5 class="fw-bold m-0">Register New User</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="text" id="addName" class="form-control mb-3 py-2" placeholder="Full Name">
                    <input type="email" id="addEmail" class="form-control mb-3 py-2" placeholder="Email Address">
                    <input type="text" id="addPhone" class="form-control mb-3 py-2" placeholder="Phone Number">
                    <input type="text" id="addAddr" class="form-control mb-3 py-2" placeholder="Full Address">
                    <input type="password" id="addPass" class="form-control mb-3 py-2" placeholder="System Password">
                    <select id="addRole" class="form-select py-2">
                        <option value="customer">Customer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-primary w-100 py-3 fw-bold" onclick="saveUser()" style="border-radius: 12px;">REGISTER USER</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="updateUserModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="fw-bold m-0">Update Profile Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="editUserId">
                    <label class="small fw-bold text-muted mb-1">FULL NAME</label>
                    <input type="text" id="editUserName" class="form-control mb-3 py-2">
                    
                    <label class="small fw-bold text-muted mb-1">PHONE NUMBER</label>
                    <input type="text" id="editUserPhone" class="form-control mb-3 py-2">
                    
                    <label class="small fw-bold text-muted mb-1">ADDRESS</label>
                    <input type="text" id="editUserAddr" class="form-control mb-3 py-2">

                    <label class="small fw-bold text-muted mb-1">SYSTEM ROLE</label>
                    <select id="editUserRole" class="form-select py-2">
                        <option value="admin">Administrator</option>
                        <option value="customer">Customer</option>
                    </select>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-primary w-100 py-3 fw-bold" onclick="submitUserUpdate()" style="border-radius: 12px;">APPLY CHANGES</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadUsers() {
            try {
                const res = await fetch('/api/users?t=' + Date.now());
                const users = await res.json();
                
                document.getElementById('userTableBody').innerHTML = users.map(u => `
                    <tr>
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="user-avatar me-3"><i class="bi bi-person-badge-fill fs-5"></i></div>
                                <span class="fw-bold text-dark">${u.fullName}</span>
                            </div>
                        </td>
                        <td>
                            <span class="small d-block fw-bold text-dark">${u.email}</span>
                            <small class="text-muted">${u.phone || 'No phone recorded'}</small>
                        </td>
                        <td>
                            <div class="small text-muted" style="max-width: 250px;">${u.address || 'N/A'}</div>
                        </td>
                        <td class="text-end">
                            <button class="btn btn-action text-primary me-1" 
                                onclick="openEditModal('${u._id}', '${u.fullName}', '${u.phone}', '${u.address}', '${u.role}')">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <button class="btn btn-action text-danger" onclick="deleteUser('${u._id}')">
                                <i class="bi bi-trash3"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) { console.error("Sync failed:", err); }
        }

        async function saveUser() {
            const data = {
                fullName: document.getElementById('addName').value,
                email: document.getElementById('addEmail').value,
                phone: document.getElementById('addPhone').value,
                address: document.getElementById('addAddr').value,
                password: document.getElementById('addPass').value,
                role: document.getElementById('addRole').value
            };
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) location.reload();
            else alert("Error: User already exists or validation failed.");
        }

        function openEditModal(id, name, phone, addr, role) {
            document.getElementById('editUserId').value = id;
            document.getElementById('editUserName').value = name;
            document.getElementById('editUserPhone').value = phone;
            document.getElementById('editUserAddr').value = addr || '';
            document.getElementById('editUserRole').value = role;
            new bootstrap.Modal(document.getElementById('updateUserModal')).show();
        }

        async function submitUserUpdate() {
            const id = document.getElementById('editUserId').value;
            const data = {
                fullName: document.getElementById('editUserName').value,
                phone: document.getElementById('editUserPhone').value,
                address: document.getElementById('editUserAddr').value,
                role: document.getElementById('editUserRole').value
            };
            const res = await fetch(`/api/users/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) {
                bootstrap.Modal.getInstance(document.getElementById('updateUserModal')).hide();
                loadUsers();
            }
        }

        async function deleteUser(id) {
            if(confirm("Confirm deletion of this user profile?")) {
                const res = await fetch(`/api/users/${id}`, { method: 'DELETE' });
                if(res.ok) loadUsers();
            }
        }

        function filterUsers() {
            const term = document.getElementById('userSearch').value.toLowerCase();
            document.querySelectorAll('#userTableBody tr').forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
            });
        }

        window.onload = loadUsers;
    </script>
</body>
</html>
